version: 1
status: phase-f-accepted
notes:
  - "Current visual direction is the accepted app_design/ playground plus the Phase F real-app port."
  - "app_design/ is ongoing playground state, not temporary trash."
  - "The earlier Pencil desktop edit frame remains historical context, but the active product direction now comes from the playground feed/settings/terminal work."
  - "Tablet, mobile, loading, empty, error, paper-mode, and terminal-mode source frames are still incomplete."

source:
  kind: hybrid
  primary: app_design
  playground_root: app_design/
  historical_pencil_file: docs/webmei-layout.pen
  historical_frame_id: bi8Au
  historical_frame_name: Wenmei Desktop Edit Mode
  revision_basis:
    - "DESIGN.md on 2026-07-05"
    - "Active Pencil editor state on 2026-07-05"
    - "app_design/ accepted by River on 2026-07-08"
    - "Phase F real-app port F11-F14 recorded done on 2026-07-08"
  design_direction:
    subject: "Agentic thinking environment for local markdown vaults"
    thesis: "A quiet desktop cockpit where agents do file work under visible sidecar supervision"
    signature: "Unified sidecar feed: chat as base layer, narration/alerts/review as filterable overlay cards with detail inspection"
  tokens:
    colors:
      paper_ash: "#EEE9DF"
      binder_cloth: "#D8D2C7"
      graphite_ink: "#1B1E23"
      fog_slate: "#67707A"
      oxide_cyan: "#1D6F78"
      signal_rust: "#A14B34"
    typography:
      display: "Newsreader"
      body: "IBM Plex Sans"
      utility: "IBM Plex Mono"

screen:
  id: wenmei-desktop-phase-f
  purpose: "Desktop shell for local markdown authoring, terminal workhorse sessions, and unified sidecar supervision"
  viewport:
    width: 1440
    height: 920
    device_scale: 1
  state: populated
  implemented: true

viewports:
  - id: desktop
    status: implemented
    width: 1440
    height: 920
    states:
      - populated
  - id: tablet
    status: missing-source
    reason: "No approved Pencil frame for the transitional layout"
    states:
      - populated
      - loading
      - empty
      - error
  - id: mobile
    status: missing-source
    reason: "No approved Pencil frame for the sheet/stacked layout"
    states:
      - populated
      - loading
      - empty
      - error

regions:
  - id: header
    node_id: NoLNs
    role: vault_coordinate_strip
    component_map:
      - src/components/Header.tsx
    bounds:
      height: 48
      width: 1440
    relationships:
      - "Pinned to the top edge of the root frame"
      - "Contains wordmark/vault coordinates, mode controls, agent scope state, terminal/panel controls, theme, settings, and alert bell"
      - "Header alert bell shows unread sidecar Alerts count and deep-links the Pi sidecar into the Alerts filter"
      - "Settings gear opens the full SettingsPanel, not a read-only placeholder"

  - id: file_tree
    node_id: Mo0xq
    role: archive_index
    component_map:
      - src/components/FileTree.tsx
      - src/App.tsx
    bounds:
      width: 280
    relationships:
      - "Pinned below the header"
      - "Stretches to the remaining frame height"
      - "Uses sparse row fills and left-edge evidence strokes for active state"
      - "Search shell and section labels stay technical and low-emphasis"

  - id: center_editor
    node_id: UBWdk
    role: dominant_region
    component_map:
      - src/components/CenterPanel.tsx
    relationships:
      - "Consumes the remaining width between left and right rails"
      - "Contains a document catalog header above the editor canvas"
      - "Line-number gutter remains fixed at 48px and uses utility mono text"
      - "Editor canvas uses paper-ash surfaces with minimal chrome"

  - id: pi_panel
    node_id: VhstS
    role: instrument_console
    component_map:
      - src/components/PiPanel.tsx
      - src/components/SidecarOverlay.tsx
      - src/components/SidecarDetail.tsx
      - src/App.tsx
    bounds:
      width: 360
    relationships:
      - "Pinned below the header"
      - "Stretches to the remaining frame height"
      - "Chat remains the base interaction layer"
      - "Narration, alerts, and review changes render as overlay cards above chat"
      - "Filter chips switch All/Narrate/Alerts/Review; chat focus collapses overlay emphasis into notification dots"
      - "Long overlay items open SidecarDetail for inspection without disrupting chat"
      - "Composer remains the primary action zone at the bottom of the rail"

  - id: settings_panel
    role: machine_and_ui_preferences
    component_map:
      - src/components/SettingsPanel.tsx
      - src/components/Lightbox.tsx
      - src/store/appStore.ts
      - src/lib/tauri-bridge.ts
      - src-tauri/src/state.rs
    relationships:
      - "Opened from the Header gear inside Lightbox"
      - "General, Terminal, Windows, Keyboard, Agent/Narration, Integrations, License, and About sections are present"
      - "Machine-level settings round-trip through state.json via AppState"

  - id: terminal_panel
    role: workhorse_session_surface
    component_map:
      - src/components/TerminalPanel.tsx
      - src-tauri/src/terminal.rs
    relationships:
      - "Terminal tab strip is the path toward multi-session workhorse supervision"
      - "Narration defaults from Settings and remains visible through sidecar feed events"

tolerances:
  geometry_px: 4
  stroke_px: 1

required_states:
  desktop:
    populated:
      implemented: true
    loading:
      implemented: false
    empty:
      implemented: false
    error:
      implemented: false
  paper_mode:
    implemented: false
  terminal_mode:
    implemented: true
  settings:
    implemented: true
  sidecar_detail:
    implemented: true

verification:
  layout_snapshot:
    command: "Historical only: Pencil MCP snapshot_layout(parentId=bi8Au, maxDepth=4, problemsOnly=true)"
    latest_result: "Historical Pencil frame had no layout problems; active visual check now happens in app_design/ via Vite."
  screenshot:
    node_id: bi8Au
    latest_result: "Historical screenshot captured; River accepted current app_design/ visual direction on 2026-07-08."
  implementation_checks:
    latest_result: "2026-07-08: root lint/check/test passed; src-tauri cargo check passed with existing unused notification warnings; app_design check/build passed; Tauri app bundle built at src-tauri/target/release/bundle/macos/Wenmei.app."
  desktop_smoke:
    latest_result: "Installed desktop app control plane responded via wenmeictl status. Freshly built bundle compiled and its executable starts cleanly; side-by-side GUI launch was not separately observable because macOS routed to the existing installed single instance."

contract_gate:
  ready: true
  reason: "Ready as the Phase F design contract for desktop implementation. Responsive and additional source states remain future work, but they no longer block closing Phase F."
