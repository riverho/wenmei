name: Release

# Builds Wenmei installers for macOS (aarch64 .dmg), Windows (.msi/.exe), and
# Linux (.deb/.rpm/.AppImage), then collects them into a DRAFT GitHub Release.
# The draft is never published automatically — a human reviews and clicks
# "Publish release" (see docs/CI_CD.md for the tag flow).
#
# Signing/notarization (not yet configured — installers are unsigned):
#   Windows: add WINDOWS_CERT_PFX_BASE64 + WINDOWS_CERT_PASSWORD secrets and a
#            signtool step before artifact upload.
#   macOS:   add APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_ID,
#            APPLE_TEAM_ID, APPLE_PASSWORD secrets; Tauri picks them up via
#            environment (APPLE_SIGNING_IDENTITY) during `tauri build`.

on:
  # Tag-driven like build-windows.yml: push a `v*` tag to cut a release.
  push:
    tags: ["v*"]
  # Manual escape hatch: Actions tab → "Release" → "Run workflow".
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/appimage/*.AppImage

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.name }}

      - name: Install Linux system deps
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl \
            wget file libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm deps
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Lint
        run: npm run lint

      # Windows builds the default (host) target so bundle paths match
      # build-windows.yml; mac/linux pass the explicit target.
      - name: Tauri build
        run: npm run desktop:build ${{ matrix.os != 'windows-latest' && format('-- --target {0}', matrix.target) || '' }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: wenmei-${{ matrix.name }}
          path: ${{ matrix.bundles }}
          if-no-files-found: error

  draft-release:
    name: Draft GitHub Release
    needs: build
    # Only tags get a Release page; manual dispatch runs stop at artifacts.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: installers/**
