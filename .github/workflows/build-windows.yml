name: Build Windows

# Builds the Wenmei desktop app on a windows-latest runner and uploads the
# MSI / NSIS installers as workflow artifacts. The Tauri CLI auto-downloads
# WiX 3.x and NSIS into %LOCALAPPDATA%\tauri\ on first run; no manual setup
# is required beyond Node + Rust.

on:
  # Tag-driven: push a tag like `v0.2.0` to cut a build. Casual commits to
  # main do NOT trigger this — keeps Actions minutes for actual releases.
  push:
    tags: ["v*"]
  # Manual escape hatch: Actions tab → "Build Windows" → "Run workflow".
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows MSI/NSIS
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: windows-msvc

      - name: Install npm deps
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Tauri build
        run: npm run desktop:build

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: wenmei-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: wenmei-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
